<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BakeManage - Hoàn tất cấu hình</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/login-screen.css">
</head>
<body>
    <div id="masterSetupScreen" class="login-screen">
        <div class="login-box">
            <h2>🍰 BakeManage</h2>
            <div style="text-align:center; margin-bottom:20px;">
                <p style="color:#666; font-size:14px;">Hoàn tất cấu hình tài khoản</p>
            </div>

            <div id="setupForm">
                <div class="form-group">
                    <label style="color:#5a3a28; font-weight:600; display:block; margin-bottom:6px;">Master ID</label>
                    <input type="text" id="setupMasterId" placeholder="Master ID" readonly style="background-color:#f5f5f5; cursor:not-allowed;">
                </div>

                <div class="form-group">
                    <label style="color:#5a3a28; font-weight:600; display:block; margin-bottom:6px;">Tên Chủ cửa hàng</label>
                    <input type="text" id="setupMasterName" placeholder="Tên chủ cửa hàng" required>
                </div>

                <div class="form-group">
                    <label style="color:#5a3a28; font-weight:600; display:block; margin-bottom:6px;">Tên Cửa hàng chính</label>
                    <input type="text" id="setupShopName" placeholder="Tên cửa hàng chính" required>
                </div>

                <div class="form-group">
                    <label style="color:#5a3a28; font-weight:600; display:block; margin-bottom:6px;">Email</label>
                    <input type="email" id="setupEmail" placeholder="Email">
                </div>

                <div class="form-group">
                    <label style="color:#5a3a28; font-weight:600; display:block; margin-bottom:6px;">Số điện thoại</label>
                    <input type="tel" id="setupPhone" placeholder="Số điện thoại">
                </div>

                <div class="form-group">
                    <label style="color:#5a3a28; font-weight:600; display:block; margin-bottom:6px;">Địa chỉ</label>
                    <textarea id="setupAddress" placeholder="Địa chỉ cửa hàng" rows="3"></textarea>
                </div>

                <button id="completeSetupBtn" style="width:100%; margin-top:15px;">✅ Hoàn tất cấu hình</button>
                <button id="skipSetupBtn" class="btn-outline" style="width:100%; margin-top:10px; background:transparent; border:1px solid #c47a44; color:#c47a44;">⏭️ Bỏ qua (cập nhật sau)</button>
            </div>

            <div id="setupMessage" class="error-msg"></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/state.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/business.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/master-setup.js"></script>
</body>
</html>
