<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BakeManage - Quản lý Tiệm Bánh</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/login-screen.css">
    <link rel="stylesheet" href="css/main-app.css">
    <link rel="stylesheet" href="css/shop-management.css">
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>🍰 BakeManage</h2>

            <div id="loginChoice" class="login-choice">
                <button type="button" class="choice-btn active" data-mode="admin" onclick="showAdminLogin()">Đăng nhập với quản trị viên</button>
                <button type="button" class="choice-btn" data-mode="branch" onclick="showBranchLogin()">Đăng nhập với chi nhánh</button>
            </div>

            <div id="adminLoginForm" class="login-panel active">
                <div class="panel-title">Quản trị viên</div>
                <input type="text" id="loginMasterId" placeholder="master_id">
                <input type="password" id="loginPassword" placeholder="password_hash">
                <button id="loginAdminBtn">Đăng nhập Quản trị viên</button>
            </div>

            <div id="branchLoginForm" class="login-panel">
                <div class="panel-title">Chi nhánh</div>
                <input type="text" id="branchMasterId" placeholder="master_id">
                <input type="text" id="branchShopId" placeholder="shop_id">
                <input type="password" id="branchPassword" placeholder="Mật khẩu chi nhánh">
                <div class="login-actions">
                    <button id="branchManagerBtn" class="google-btn">Đăng nhập Quản lý</button>
                    <button id="branchStaffBtn">Đăng nhập Nhân viên</button>
                </div>
                <div class="hint">Quản lý dùng <b>administrator_password</b>, nhân viên dùng <b>staff_password</b>.</div>
            </div>

            <div id="authMessage" class="error-msg"></div>
        </div>
    </div>

    <div id="mainApp" class="main-app" style="display:none;"></div>
    <div id="shopManagementApp" class="shop-management-app" style="display:none;"></div>

    <script src="js/data-mock.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/shop-management.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
